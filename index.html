<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pegada de Carbono Escolar</title>
    <style>
        /* Mantive o mesmo estilo anterior (resumido para economizar espaço) */
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --background: #f1f8e9;
            --text: #333;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--background); margin:0; padding:20px; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .container { background: var(--card-bg); border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); padding:30px; max-width:600px; width:100%; }
        h1 { color: var(--primary); text-align:center; }
        .question-step { display:none; }
        .question-step.active { display:block; }
        .options-container { display:flex; flex-direction:column; gap:12px; }
        label { padding:15px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer; display:flex; align-items:center; }
        label:hover { background:#f5f5f5; border-color:#4caf50; }
        input[type="radio"] { margin-right:15px; accent-color:#2e7d32; }
        .buttons { display:flex; justify-content:space-between; margin-top:30px; }
        button { padding:12px 24px; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
        .btn-next { background:#2e7d32; color:white; }
        #result-screen { text-align:center; display:none; }
        .score { font-size:48px; font-weight:bold; color:var(--primary); margin:20px 0; }
        .badge { padding:8px 16px; border-radius:20px; font-weight:bold; margin:15px 0; display:inline-block; }
        .badge-good { background:#c8e6c9; color:#256029; }
        .badge-mod { background:#ffe0b2; color:#c66900; }
        .badge-bad { background:#ffcdd2; color:#b71c1c; }
    </style>
</head>
<body>
<div class="container">
    <!-- Perguntas (mesmas do original) -->
    <div class="question-step active" id="step-1">
        <div class="question-text">1. Como você costuma ir para a escola?</div>
        <div class="options-container">
            <label><input type="radio" name="q1" value="0" checked><span>A pé ou de Bicicleta</span></label>
            <label><input type="radio" name="q1" value="15"><span>De Ônibus ou Metrô</span></label>
            <label><input type="radio" name="q1" value="30"><span>De Moto</span></label>
            <label><input type="radio" name="q1" value="50"><span>De Carro</span></label>
        </div>
        <div class="buttons"><button class="btn-next" onclick="nextStep(1)">Próxima</button></div>
    </div>
    <!-- step-2, step-3, step-4 mantidos iguais ao seu código original -->

    <div id="result-screen">
        <h1>Sua Pegada de Carbono Estimada</h1>
        <div class="score" id="total-score">0 kg</div>
        <p>de CO₂ equivalente por mês</p>
        <div id="badge-container" class="badge"></div>
        <p id="feedback-text"></p>
        
        <button onclick="submitToForm()" style="background:#2e7d32; color:white; padding:14px 28px; font-size:17px; margin-top:20px;">
            📋 Abrir e Preencher Formulário Automaticamente
        </button>
        
        <button onclick="restartQuiz()" style="margin-top:10px;">Refazer Teste</button>
    </div>
</div>

<script>
    // Funções de navegação (nextStep, prevStep) — mantenha as suas originais

    function calculateResult() {
        const q1 = parseInt(document.querySelector('input[name="q1"]:checked').value) || 0;
        const q2 = parseInt(document.querySelector('input[name="q2"]:checked').value) || 0;
        const q3 = parseInt(document.querySelector('input[name="q3"]:checked').value) || 0;
        const q4 = parseInt(document.querySelector('input[name="q4"]:checked').value) || 0;
        
        const total = q1 + q2 + q3 + q4;
        
        document.getElementById('total-score').innerText = total + " kg";
        
        const badge = document.getElementById('badge-container');
        const feedback = document.getElementById('feedback-text');
        let nivel = "";

        if (total <= 35) {
            badge.innerText = "Pegada Ecológica Baixa 🌱";
            badge.className = "badge badge-good";
            nivel = "Baixa";
            feedback.innerText = "Parabéns! Seus hábitos são sustentáveis.";
        } else if (total <= 85) {
            badge.innerText = "Pegada Ecológica Moderada ⚠️";
            badge.className = "badge badge-mod";
            nivel = "Moderada";
            feedback.innerText = "Você está no caminho certo, mas ainda pode melhorar.";
        } else {
            badge.innerText = "Pegada Ecológica Alta 🚨";
            badge.className = "badge badge-bad";
            nivel = "Alta";
            feedback.innerText = "Seus hábitos geram alto impacto. Pequenas mudanças fazem diferença.";
        }

        // Salva dados para o formulário
        window.quizResult = { total, nivel };

        document.querySelectorAll('.question-step').forEach(s => s.style.display = 'none');
        document.getElementById('result-screen').style.display = 'block';
    }

    function submitToForm() {
        const result = window.quizResult;
        if (!result) return alert("Calcule o resultado primeiro!");

        const formUrl = "https://forms.cloud.microsoft/r/XHJ6S1nxZ8";

        // Abre o formulário em nova aba
        const win = window.open(formUrl, '_blank');

        // Exibe instruções claras
        let msg = `✅ Formulário aberto!\n\n`;
        msg += `Sua pontuação: ${result.total} kg → ${result.nivel}\n\n`;
        msg += `No formulário:\n`;
        msg += `- Selecione a opção correspondente a "${result.nivel}"\n`;
        msg += `- Cole a pontuação ${result.total} no campo de pontos (se existir)\n\n`;
        msg += `Depois clique em "Enviar".`;

        alert(msg);
    }

    // Auto preencher exemplo (opcional)
    window.onload = () => {
        // Você pode chamar calculateResult() aqui se quiser auto-calcular
    };
</script>
</body>
</html>
